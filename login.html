<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Lucky Nation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; text-align: center; }
        .auth-container h2 { margin-bottom: 1.5rem; }
        .form-group { text-align: left; margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: #ccc; }
        .form-group input { width: 100%; padding: 0.8rem; background: #111; border: 1px solid #444; border-radius: 0.5rem; color: white; }
        .auth-btn { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, var(--red), var(--rose)); border: none; border-radius: 0.5rem; color: white; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        .toggle-link { margin-top: 1.5rem; font-size: 0.85rem; color: #888; cursor: pointer; display: block; }
        .toggle-link span { color: var(--rose); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 id="authTitle">Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="LuckyPlayer">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="auth-btn" id="submitBtn" onclick="handleAuth()">Login</button>
        <a class="toggle-link" id="toggleLink" onclick="toggleMode()">Don't have an account? <span>Sign Up</span></a>
        <br>
        <a href="forum.html" style="color: #666; font-size: 0.8rem;">← Back to Forum</a>
    </div>

    <script>
        const AUTH_API = 'https://eocfyx3v7zr8kvf.m.pipedream.net';
        let isSignUp = false;

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').innerText = isSignUp ? 'Sign Up' : 'Login';
            document.getElementById('submitBtn').innerText = isSignUp ? 'Create Account' : 'Login';
            document.getElementById('toggleLink').innerHTML = isSignUp ? 
                'Already have an account? <span>Login</span>' : 
                'Don\'t have an account? <span>Sign Up</span>';
        }

        async function handleAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const action = isSignUp ? 'register' : 'login';

            if(!username || !password) return alert("Fill in all fields.");

            try {
                const res = await fetch(`${AUTH_API}?action=${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('luckyUser', JSON.stringify(data.user));
                    window.location.href = 'forum.html';
                } else {
                    alert(data.error || "Authentication failed.");
                }
            } catch (e) {
                alert("Server error.");
            }
        }
    </script>
</body>
</html>
