<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth – Lucky Nation</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
    .auth-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 2.5rem; border-radius: 1rem; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
    .auth-card h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
    .auth-card p { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #ccc; }
    .form-group input { width: 100%; padding: 0.8rem; background: #111; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
    .form-group input:focus { border-color: var(--red); }
    .auth-btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, var(--red), var(--rose)); border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .toggle-text { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; }
    .toggle-text span { color: var(--rose); cursor: pointer; text-decoration: underline; }
  </style>
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 id="title">Welcome Back</h1>
      <p id="subtitle">Log in to your Lucky Nation account</p>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Minecraft Username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="auth-btn" id="mainBtn" onclick="submitAuth()">Login</button>
      
      <p class="toggle-text" id="toggleArea">
        Don't have an account? <span onclick="toggleMode()">Sign Up</span>
      </p>
    </div>
  </div>

  <script>
    const AUTH_API = 'https://eocfyx3v7zr8kvf.m.pipedream.net';
    let mode = 'login';

    function toggleMode() {
      mode = (mode === 'login') ? 'register' : 'login';
      document.getElementById('title').innerText = mode === 'login' ? 'Welcome Back' : 'Create Account';
      document.getElementById('subtitle').innerText = mode === 'login' ? 'Log in to your Lucky Nation account' : 'Join the community today';
      document.getElementById('mainBtn').innerText = mode === 'login' ? 'Login' : 'Sign Up';
      document.getElementById('toggleArea').innerHTML = mode === 'login' ? 
        'Don\'t have an account? <span onclick="toggleMode()">Sign Up</span>' : 
        'Already have an account? <span onclick="toggleMode()">Login</span>';
    }

    async function submitAuth() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if(!u || !p) return alert("Fields cannot be empty");

      const btn = document.getElementById('mainBtn');
      btn.disabled = true;
      btn.innerText = "Processing...";

      try {
        const res = await fetch(`${AUTH_API}?action=${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('luckyUser', JSON.stringify(data.user));
          window.location.href = 'forum.html';
        } else {
          alert(data.error || "Auth failed");
        }
      } catch (e) {
        alert("Server Error");
      } finally {
        btn.disabled = false;
        btn.innerText = mode === 'login' ? 'Login' : 'Sign Up';
      }
    }
  </script>
</body>
</html>
