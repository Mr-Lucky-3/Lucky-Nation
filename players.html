<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Player Lookup &middot; Lucky Nation</title>
  <meta name="description" content="Look up any player profile and stats on Lucky Nation."/>
  <meta property="og:title" content="Player Lookup &middot; Lucky Nation"/>
  <meta property="og:description" content="Look up any player profile and stats on Lucky Nation."/>
  <meta property="og:image" content="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/6986e5d9a0adf68cbfc217ea/1363cce94_Screenshot2026-02-06235207.png"/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#ef4444"/>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="load.js" defer></script>
</head>
<body>
  <nav class="site-nav"></nav>
  <div class="ambient">
    <div class="ambient-blob ambient-blob-top"></div>
    <div class="ambient-blob ambient-blob-bottom"></div>
  </div>

  <section class="page-hero">
    <h1>Player <span class="gradient-text">Lookup</span></h1>
    <p>Search for any player on Lucky Nation to view their profile and stats.</p>
  </section>
  <section class="section"><div class="container">
    <div class="player-search-bar">
      <input type="text" class="form-input" id="pInput" placeholder="Enter Minecraft username&hellip;" onkeydown="if(event.key==='Enter')search()"/>
      <button class="btn btn-primary" onclick="search()">Search</button>
    </div>
    <div class="player-result" id="pResult">
      <div class="player-header">
        <div class="player-skin-lg"><img id="pSkin" src="" alt=""/></div>
        <div><div class="player-name" id="pName"></div><div class="player-uuid" id="pUUID"></div><div style="margin-top:.5rem;" id="pBadge"></div></div>
      </div>
      <div class="player-stats" id="pStats"></div>
    </div>
    <div class="player-not-found" id="pNF"><div style="font-size:3rem;margin-bottom:1rem;">&#128269;</div><p>Player not found. Make sure you entered the correct username.</p></div>
  </div></section>
  <footer class="footer"></footer>
<script>
var DB={mrlucky3:{name:'MrLucky3',uuid:'069a79f4-44e9-4726-a5be-fca90e38aaf5',rank:'Owner',money:'$2,450,000',kills:2100,playtime:'1,204 hrs',votes:285,joined:'Jan 2025'},steve:{name:'Steve',uuid:'8667ba71-b85a-4004-af54-457a9734eed7',rank:'Member',money:'$1,200,000',kills:210,playtime:'892 hrs',votes:152,joined:'Feb 2025'},herobrine:{name:'Herobrine',uuid:'f498513c-e8c8-4173-9df6-4cc36905ec6e',rank:'VIP',money:'$654,200',kills:876,playtime:'310 hrs',votes:44,joined:'Mar 2025'},alex:{name:'Alex',uuid:'ec561538-f3fd-461d-aff5-086b22154bce',rank:'Member',money:'$432,100',kills:120,playtime:'401 hrs',votes:175,joined:'Apr 2025'}};
var RC={Owner:'badge-red',Admin:'badge-purple',Moderator:'badge-green',VIP:'badge-amber',Member:'badge-gray'};
function search(){
  var q=document.getElementById('pInput').value.trim().toLowerCase();
  var r=document.getElementById('pResult'),nf=document.getElementById('pNF');
  r.classList.remove('visible');nf.classList.remove('visible');
  if(!q)return;
  var p=DB[q];
  if(!p){nf.classList.add('visible');return;}
  document.getElementById('pSkin').src='https://crafthead.net/helm/'+p.name;
  document.getElementById('pName').textContent=p.name;
  document.getElementById('pUUID').textContent=p.uuid;
  document.getElementById('pBadge').innerHTML='<span class="badge '+(RC[p.rank]||'badge-gray')+'">'+p.rank+'</span>';
  document.getElementById('pStats').innerHTML=[['&#128176;',p.money,'Balance'],['&#9876;&#65039;',p.kills,'Kills'],['&#9201;',p.playtime,'Playtime'],['&#128379;',p.votes,'Votes'],['&#128197;',p.joined,'Joined']].map(function(x){return '<div class="player-stat"><div class="player-stat-val">'+x[0]+' '+x[1]+'</div><div class="player-stat-label">'+x[2]+'</div></div>';}).join('');
  r.classList.add('visible');
}
</script>
</body>
</html>
