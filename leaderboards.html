<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Leaderboards &middot; Lucky Nation</title>
  <meta name="description" content="Top players on Lucky Nation by wealth, kills, playtime, and votes."/>
  <meta property="og:title" content="Leaderboards &middot; Lucky Nation"/>
  <meta property="og:description" content="Top players on Lucky Nation by wealth, kills, playtime, and votes."/>
  <meta property="og:image" content="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/6986e5d9a0adf68cbfc217ea/1363cce94_Screenshot2026-02-06235207.png"/>
  <meta property="og:type" content="website"/>
  <meta name="theme-color" content="#ef4444"/>
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css"/>
  <script src="load.js" defer></script>
</head>
<body>
  <nav class="site-nav"></nav>
  <div class="ambient">
    <div class="ambient-blob ambient-blob-top"></div>
    <div class="ambient-blob ambient-blob-bottom"></div>
  </div>

  <section class="page-hero">
    <h1><span class="gradient-text">Leaderboards</span></h1>
    <p>Who's dominating Lucky Nation? Rankings update daily. Climb the boards and earn bragging rights.</p>
  </section>
  <section class="section"><div class="container">
    <div class="lb-tabs">
      <button class="lb-tab active" onclick="switchLb('money',this)">&#128176; Richest</button>
      <button class="lb-tab" onclick="switchLb('kills',this)">&#9876;&#65039; Kills</button>
      <button class="lb-tab" onclick="switchLb('playtime',this)">&#9201; Playtime</button>
      <button class="lb-tab" onclick="switchLb('votes',this)">&#128379; Votes</button>
    </div>
    <div class="card">
      <div id="lb-money" class="lb-panel active"><div id="lb-money-c"></div></div>
      <div id="lb-kills" class="lb-panel"><div id="lb-kills-c"></div></div>
      <div id="lb-playtime" class="lb-panel"><div id="lb-playtime-c"></div></div>
      <div id="lb-votes" class="lb-panel"><div id="lb-votes-c"></div></div>
    </div>
    <p style="text-align:center;color:var(--gray-5);margin-top:1.5rem;font-size:.8rem;">Rankings update every 24 hours &middot; Connect to the game for live stats</p>
  </div></section>
  <footer class="footer"></footer>
<script>
function switchLb(n,b){document.querySelectorAll('.lb-panel').forEach(function(p){p.classList.remove('active');});document.querySelectorAll('.lb-tab').forEach(function(x){x.classList.remove('active');});document.getElementById('lb-'+n).classList.add('active');b.classList.add('active');}
function rc(i){return i===0?'gold':i===1?'silver':i===2?'bronze':'';}
function medal(i){return i===0?'&#129351;':i===1?'&#129352;':i===2?'&#129353;':'#'+(i+1);}
function tbl(id,rows,label){
  var h='<table class="lb-table"><thead><tr><th>Rank</th><th>Player</th><th>'+label+'</th></tr></thead><tbody>';
  rows.forEach(function(r,i){h+='<tr><td class="lb-rank '+rc(i)+'">'+medal(i)+'</td><td><div class="lb-player"><div class="lb-skin"><img src="https://crafthead.net/helm/'+r.n+'" loading="lazy"></div><span class="lb-name">'+r.n+'</span></div></td><td class="lb-value">'+r.v+'</td></tr>';});
  h+='</tbody></table>';
  document.getElementById(id).innerHTML=h;
}
tbl('lb-money-c',[{n:'MrLucky3',v:'$2,450,000'},{n:'Steve',v:'$1,200,000'},{n:'Notch',v:'$987,500'},{n:'Herobrine',v:'$654,200'},{n:'Alex',v:'$432,100'},{n:'CreeperKing',v:'$310,000'},{n:'DiamondHunter',v:'$289,500'},{n:'SurvivalPro',v:'$201,000'},{n:'FarmMaster',v:'$178,300'},{n:'BuilderBob',v:'$120,000'}],'Net Worth');
tbl('lb-kills-c',[{n:'PvPGod',v:'4,201'},{n:'BladeRunner',v:'3,550'},{n:'StealthArcher',v:'2,890'},{n:'MrLucky3',v:'2,100'},{n:'CombatAce',v:'1,750'},{n:'SwordMaster',v:'1,320'},{n:'ArenaKing',v:'987'},{n:'Herobrine',v:'876'},{n:'SniperElite',v:'765'},{n:'WarriorX',v:'654'}],'PvP Kills');
tbl('lb-playtime-c',[{n:'MrLucky3',v:'1,204 hrs'},{n:'Steve',v:'892 hrs'},{n:'FarmMaster',v:'750 hrs'},{n:'BuilderBob',v:'680 hrs'},{n:'SurvivalPro',v:'610 hrs'},{n:'DiamondHunter',v:'540 hrs'},{n:'CreeperKing',v:'482 hrs'},{n:'Alex',v:'401 hrs'},{n:'Notch',v:'389 hrs'},{n:'Herobrine',v:'310 hrs'}],'Playtime');
tbl('lb-votes-c',[{n:'VotingLegend',v:'312'},{n:'MrLucky3',v:'285'},{n:'SupporterPro',v:'240'},{n:'LoyalPlayer',v:'198'},{n:'Alex',v:'175'},{n:'Steve',v:'152'},{n:'DailyVoter',v:'131'},{n:'CreeperKing',v:'110'},{n:'BuilderBob',v:'98'},{n:'SurvivalPro',v:'87'}],'Votes');
</script>
</body>
</html>
